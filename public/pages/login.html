<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MarketSmith — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    padding: 40px 36px;
    text-align: center;
  }

  .login-logo {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--ink-500);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .login-title {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    color: var(--gold-400);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .login-subtitle {
    font-size: 13px;
    color: var(--ink-500);
    margin-bottom: 32px;
  }

  .login-form { display: flex; flex-direction: column; gap: 14px; text-align: left; }

  .login-form label {
    font-size: 12px;
    color: var(--ink-500);
    margin-bottom: 4px;
    display: block;
  }

  .login-submit {
    margin-top: 8px;
    width: 100%;
    padding: 13px;
    font-size: 15px;
  }

  .login-hint {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--navy-700);
    font-size: 12px;
    color: var(--ink-500);
    line-height: 1.6;
  }
  .login-hint strong { color: var(--ink-300); }

  .ticker-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 28px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--navy-600);
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="card login-card">
    <div class="ticker-row">— · — · — · — · — · — · —</div>
    <div class="login-logo">QuantX Week 2 · IIT BHU Quant Club</div>
    <div class="login-title">MARKETSMITH</div>
    <div class="login-subtitle">Summer Camp Trading Arena</div>

    <form class="login-form" id="loginForm">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary login-submit" id="loginBtn">Login</button>
      <div class="error-msg" id="errorMsg" style="display:none;"></div>
    </form>

    <div class="login-hint">
      <strong>Password format:</strong> first 4 letters of your name (lowercase) + last 4 digits of your phone.<br>
      Example: Arjun, phone ending 4321 → <strong>arju4321</strong>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // If already logged in, skip straight to lobby
  if (API.token()) {
    window.location.href = '/lobby';
  }

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await API.post('/auth/login', { email, password });
      API.setToken(data.token);
      API.setUser(data.user);
      window.location.href = '/lobby';
    } catch (err) {
      errorMsg.textContent = err.message || 'Invalid email or password';
      errorMsg.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });
</script>

</body>
</html>
